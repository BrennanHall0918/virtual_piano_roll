<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Soundboard</title>

    <link rel="stylesheet" href="public/style.css">
</head>
<body>
    <header>
        <h1>NeXTStack Virtual Soundboard</h1>
    </header>

    <main>

        <section class="roll">

            <section class="controls">

                <div class="waveform-control">
                    <label for="waveform">Waveform</label>
                    <select id="waveform">
                        <option value="sine" selected>Sine</option>
                        <option value="square">Square</option>
                        <option value="triangle">Triangle</option>
                        <option value="sawtooth">Sawtooth</option>
                    </select>
                </div>

                <div class="volume-control">
                    <label for="volume">< VOLUME ></label>
                    <input
                        type="range"
                        id="volume"
                        min="0"
                        max="1"
                        step="0.01"
                        value="0.2">
                </div>
            </section>

            <section class="oct1">

                <section class="key-grid-sharps-oct1">
                    <button class="btn-oct1 sharp" data-note="C#5">
                        <span class="keybind">2</span>
                        <span class="note">C#</span>
                    </button>

                    <button class="btn-oct1 sharp" data-note="D#5">
                        <span class="keybind">3</span>
                        <span class="note">D#</span>
                    </button>

                    <button class="btn-oct1 sharp invisible"></button>

                    <button class="btn-oct1 sharp" data-note="F#5">
                        <span class="keybind">5</span>
                        <span class="note">F#</span>
                    </button>

                    <button class="btn-oct1 sharp" data-note="G#5">
                        <span class="keybind">6</span>
                        <span class="note">G#</span>
                    </button>

                    <button class="btn-oct1 sharp" data-note="A#5">
                        <span class="keybind">7</span>
                        <span class="note">A#</span>
                    </button>
                </section>

                <section class="key-grid-naturals-oct1">
                    <button class="btn-oct1 natural" data-note="C5">
                        <span class="keybind">Q</span>
                        <span class="note">C<small class="octave-num">5</small></span>
                    </button>

                    <button class="btn-oct1 natural" data-note="D5">
                        <span class="keybind">W</span>
                        <span class="note">D</span>
                    </button>

                    <button class="btn-oct1 natural" data-note="E5">
                        <span class="keybind">E</span>
                        <span class="note">E</span>
                    </button>

                    <button class="btn-oct1 natural" data-note="F5">
                        <span class="keybind">R</span>
                        <span class="note">F</span>
                    </button>

                    <button class="btn-oct1 natural" data-note="G5">
                        <span class="keybind">T</span>
                        <span class="note">G</span>
                    </button>

                    <button class="btn-oct1 natural" data-note="A5">
                        <span class="keybind">Y</span>
                        <span class="note">A</span>
                    </button>

                    <button class="btn-oct1 natural" data-note="B5">
                        <span class="keybind">U</span>
                        <span class="note">B</span>
                    </button>
                </section>
            </section>

            <section class="oct2">

                <section class="key-grid-sharps-oct2">
                    <button class="btn-oct2 sharp" data-note="C#4">
                        <span class="keybind">S</span>
                        <span class="note">C#</span>
                    </button>

                    <button class="btn-oct2 sharp" data-note="D#4">
                        <span class="keybind">D</span>
                        <span class="note">D#</span>
                    </button>

                    <button class="btn-oct2 sharp invisible"></button>

                    <button class="btn-oct2 sharp" data-note="F#4">
                        <span class="keybind">G</span>
                        <span class="note">F#</span>
                    </button>

                    <button class="btn-oct2 sharp" data-note="G#4">
                        <span class="keybind">H</span>
                        <span class="note">G#</span>
                    </button>

                    <button class="btn-oct2 sharp" data-note="A#4">
                        <span class="keybind">J</span>
                        <span class="note">A#</span>
                    </button>
                </section>

                <section class="key-grid-naturals-oct2">
                    <button class="btn-oct2 natural" data-note="C4">
                        <span class="keybind">Z</span>
                        <span class="note">C<small class="octave-num">4</small></span>
                    </button>

                    <button class="btn-oct2 natural" data-note="D4">
                        <span class="keybind">X</span>
                        <span class="note">D</span>
                    </button>

                    <button class="btn-oct2 natural" data-note="E4">
                        <span class="keybind">C</span>
                        <span class="note">E</span>
                    </button>

                    <button class="btn-oct2 natural" data-note="F4">
                        <span class="keybind">V</span>
                        <span class="note">F</span>
                    </button>

                    <button class="btn-oct2 natural" data-note="G4">
                        <span class="keybind">B</span>
                        <span class="note">G</span>
                    </button>

                    <button class="btn-oct2 natural" data-note="A4">
                        <span class="keybind">N</span>
                        <span class="note">A</span>
                    </button>

                    <button class="btn-oct2 natural" data-note="B4">
                        <span class="keybind">M</span>
                        <span class="note">B</span>
                    </button>
                </section>

            </section>
        </section>

    </main>

    <footer>
        <small><p>Site by: <a href="https://github.com/BrennanHall0918">Brennan Hall</a></p></small>
    </footer>

    <script src="script.js"></script>
</body>
</html>
