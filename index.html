<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Soundboard</title>

    <link rel="stylesheet" href="public/style.css">
</head>
<body>
    <header>
        <h1>NeXTStack Virtual Soundboard</h1>
    </header>

    <main>

        <section class="roll">
            <section class="oct1">
                <section class="key-grid-sharps-oct1">
                    <button class="btn-oct1 sharp" id="csh-oct1">C#</button>
                    <button class="btn-oct1 sharp" id="dsh-oct1">D#</button>
                    <button class="btn-oct1 sharp invisible"></button>
                    <button class="btn-oct1 sharp" id="fsh-oct1">F#</button>
                    <button class="btn-oct1 sharp" id="gsh-oct1">G#</button>
                    <button class="btn-oct1 sharp" id="ash-oct1">A#</button>
                </section>

                <section class="key-grid-naturals-oct1">
                    <button class="btn-oct1 natural" id="c-oct1">C<small class="octave-num">5</small></button>
                    <button class="btn-oct1 natural" id="d-oct1">D</button>
                    <button class="btn-oct1 natural" id="e-oct1">E</button>
                    <button class="btn-oct1 natural" id="f-oct1">F</button>
                    <button class="btn-oct1 natural" id="g-oct1">G</button>
                    <button class="btn-oct1 natural" id="a-oct1">A</button>
                    <button class="btn-oct1 natural" id="b-oct1">B</button>
                </section>
            </section>

            <section class="oct2">
                <section class="key-grid-sharps-oct2">
                    <button class="btn-oct2 sharp" id="csh-oct2">C#</button>
                    <button class="btn-oct2 sharp" id="dsh-oct2">D#</button>
                    <button class="btn-oct1 sharp invisible"></button>
                    <button class="btn-oct2 sharp" id="fsh-oct2">F#</button>
                    <button class="btn-oct2 sharp" id="gsh-oct2">G#</button>
                    <button class="btn-oct2 sharp" id="ash-oct2">A#</button>
                </section>

                <section class="key-grid-naturals-oct2">
                    <button class="btn-oct2 natural" id="c-oct2">C<small class="octave-num">4</small></button>
                    <button class="btn-oct2 natural" id="d-oct2">D</button>
                    <button class="btn-oct2 natural" id="e-oct2">E</button>
                    <button class="btn-oct2 natural" id="f-oct2">F</button>
                    <button class="btn-oct2 natural" id="g-oct2">G</button>
                    <button class="btn-oct2 natural" id="a-oct2">A</button>
                    <button class="btn-oct2 natural" id="b-oct2">B</button>
                </section>
            </section>
        </section>

    </main>

    <footer>
        <small><p>Site by: <a href="https://github.com/BrennanHall0918">Brennan Hall</a></p></small>
    </footer>

    <script src="script.js"></script>
</body>
</html>
